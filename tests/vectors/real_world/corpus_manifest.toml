# Gateable real-world corpus metadata.
#
# Generated media remains local/ignored by default. The release corpus smoke
# uses this manifest to decide which entries may satisfy a corpus coverage
# claim; arbitrary files in this directory remain exploratory only.
#
# Pinned SHA256 digests below hash the Opus packet payload bytes only — the
# concatenated payloads of every Ogg page after the OpusHead and OpusTags
# header pages. This pins encoder output without depending on muxer state
# (the Ogg page serial is randomised per FFmpeg invocation) or on metadata
# vendor strings written into OpusTags. The digests were locked under:
#   ffmpeg version 7.0.2-static https://johnvansickle.com/ffmpeg/  Copyright (c) 2000-2024 the FFmpeg developers
#
# A maintainer running a different FFmpeg version may see a hard-fail SHA256
# mismatch when the encoder output itself changes (the pin only fires on real
# encoder drift, not muxer/metadata variation). In that case either match the
# locked FFmpeg version or re-lock both digests (manifest-only change).

[[entries]]
id = "ffmpeg-native-sine-32k"
path = "ffmpeg-native-sine-32k.opus"
class = "generated-non-reference"
encoder = "FFmpeg native opus"
source_fixture = "tests/vectors/48k_sine1k_loud.wav"
generation_command = "ffmpeg -y -hide_banner -loglevel error -i tests/vectors/48k_sine1k_loud.wav -c:a opus -strict -2 -b:a 32k -ac 1 tests/vectors/real_world/ffmpeg-native-sine-32k.opus"
license = "Generated locally from checked-in synthetic WAV fixture; generated media remains untracked."
container_support = "supported-ogg-family0"
required = true
max_size_bytes = 100000
oracle = "exact-pcm-parity-vs-c-reference"
bitrate_kbps = 32
channels = 1

