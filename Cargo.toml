[package]
name = "mdopus"
version = "0.1.0"
edition = "2024"
build = "tests/harness/build.rs"
autobenches = false
autotests = false

[dependencies]

[build-dependencies]
cc = "1"

# Disable overflow checks in debug mode to match C wrapping semantics.
# The C reference relies on integer overflow wrapping; Rust panics by default.
[profile.dev]
overflow-checks = false

[profile.release]
lto = "fat"
codegen-units = 1

[[bin]]
name = "mdopus-compare"
path = "tests/harness/main.rs"
